plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.viewportmetrics'
version = '0.1.0'

android {
  namespace "expo.modules.viewportmetrics"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
    consumerProguardFiles "consumer-rules.pro"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.core:core-ktx:1.17.0"
  implementation "androidx.window:window:1.5.1"
}
